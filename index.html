<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1a56db"/>
<title>Start Zero – Portal de Pedidos</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a56db;font-family:-apple-system,system-ui,Arial,sans-serif;color:#fff}
input,select,textarea{font-family:inherit;outline:none;-webkit-appearance:none}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.4)}
button{cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:inherit}
.screen{display:none;min-height:100vh}
.screen.active{display:block}
/* AUTH */
#auth-screen{background:#1a56db;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;min-height:100vh}
#auth-screen.active{display:flex}
.auth-box{background:#1340b0;border-radius:18px;padding:24px 20px;width:100%;max-width:380px}
.auth-title{font-size:15px;font-weight:800;color:#FFD000;text-align:center;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:20px}
.auth-label{font-size:11px;font-weight:700;color:#FFD000;text-transform:uppercase;letter-spacing:1px;display:block;text-align:center;margin-bottom:6px}
.auth-input{width:100%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);border-radius:8px;padding:10px 12px;color:#fff;font-size:13px;text-align:center;text-transform:uppercase;margin-bottom:12px}
.auth-input[type=email]{text-transform:lowercase}
.auth-input:focus{border-color:#FFD000}
.btn-primary{display:block;width:100%;padding:13px;background:#FFD000;border:none;border-radius:10px;color:#1340b0;font-weight:700;font-size:15px;margin-bottom:12px}
.btn-link{background:transparent;border:none;color:rgba(255,255,255,0.6);font-size:13px;text-decoration:underline;display:block;margin:0 auto}
.err-msg{color:#fca5a5;font-size:12px;text-align:center;margin-bottom:10px}
.divider{display:flex;align-items:center;gap:8px;margin:6px 0;color:rgba(255,255,255,0.3);font-size:12px}
.divider div{flex:1;height:1px;background:rgba(255,255,255,0.15)}
.pw-wrap{position:relative;margin-bottom:12px}
.pw-wrap .auth-input{margin-bottom:0}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:rgba(255,255,255,0.5);font-size:12px;padding:4px}
/* MAIN APP */
#app-screen{display:none;background:#1a56db}
#app-screen.active{display:block}
.hdr{position:sticky;top:0;z-index:100;background:#1a56db;border-bottom:1px solid rgba(255,255,255,0.15);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{width:42px;height:42px;border-radius:6px;object-fit:cover}
.hdr-center{flex:1;text-align:center}
.hdr-title{font-weight:900;font-size:20px}
.hdr-sub{font-size:11px;font-weight:600;color:#FFD000;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:6px}
.btn-sair{background:transparent;border:none;color:rgba(255,255,255,0.5);font-size:11px;padding:4px 8px}
.btn-cart{position:relative;background:transparent;border:none;padding:6px 10px;font-size:26px;line-height:1}
.cart-badge{position:absolute;top:-2px;right:-2px;background:#FFD000;color:#1a56db;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center}
nav{background:#1340b0;border-bottom:1px solid rgba(255,255,255,0.1);padding:0 6px;display:flex;overflow-x:auto;position:sticky;top:60px;z-index:90}
.nav-btn{padding:11px 9px;background:transparent;border:none;color:rgba(255,255,255,0.6);font-size:12px;font-weight:500;white-space:nowrap;border-bottom:3px solid transparent}
.nav-btn.active{color:#FFD000;border-bottom:3px solid #FFD000;font-weight:700}
main{padding:14px;padding-bottom:120px;max-width:800px;margin:0 auto}
/* FORM */
.sec-title{font-size:12px;font-weight:700;color:#FFD000;text-transform:uppercase;letter-spacing:2px;text-align:center;margin-bottom:10px}
.sec{margin-bottom:20px}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.fld{flex:1;min-width:120px}
.fld-label{font-size:11px;font-weight:700;color:#FFD000;text-transform:uppercase;letter-spacing:1px;display:block;text-align:center;margin-bottom:5px}
.fld-label.err{color:#fca5a5}
.fld-input{width:100%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);border-radius:8px;padding:9px 10px;color:#fff;font-size:12px;text-align:center;text-transform:uppercase}
.fld-input:focus{border-color:#FFD000}
.fld-input.err{border-color:#fca5a5}
.fld-errmsg{font-size:10px;color:#fca5a5;margin-top:3px;text-align:center}
.cep-msg{font-size:11px;margin-top:3px;text-align:center}
/* CATALOG */
.search-box{display:flex;align-items:center;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:9px 12px;margin-bottom:8px}
.search-input{flex:1;background:transparent;border:none;color:#fff;font-size:13px}
.brands{display:flex;gap:5px;margin-bottom:12px}
.brand-btn{flex:1;padding:6px 3px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:#1340b0;color:#fff;font-size:10px;font-weight:500}
.brand-btn.active{background:#FFD000;color:#1340b0;font-weight:700;border-color:#FFD000}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,240px),1fr));gap:10px}
.prod-card{background:#1340b0;border:1px solid rgba(255,255,255,0.2);border-radius:14px;padding:12px 14px;display:flex;flex-direction:column;gap:4px}
.prod-img{font-size:24px}
.prod-brand{font-size:9px;color:#c7d9fd;text-transform:uppercase;letter-spacing:2px}
.prod-name{font-size:13px;font-weight:700}
.prod-unit{font-size:11px;color:#FFD000;font-weight:600}
.prod-bot{display:flex;align-items:flex-end;justify-content:space-between;margin-top:auto}
.prod-price{font-size:16px;font-weight:800}
.prod-min{font-size:9px;color:#c7d9fd}
.btn-add{background:#fff;border:none;border-radius:7px;color:#1340b0;font-weight:700;font-size:11px;padding:7px 11px}
.qty-ctrl{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:4px 7px}
.qty-btn{background:transparent;border:none;color:#FFD000;font-size:15px;font-weight:700;line-height:1}
.qty-num{font-size:13px;font-weight:800;min-width:16px;text-align:center}
/* CART */
.cart-item{display:flex;gap:10px;align-items:center;background:#1340b0;border:1px solid rgba(255,255,255,0.15);border-radius:11px;padding:12px;margin-bottom:9px}
.ci-img{font-size:22px}
.ci-info{flex:1}
.ci-name{font-weight:700;font-size:13px}
.ci-unit{font-size:10px;color:#c7d9fd}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.ci-total{font-size:14px;font-weight:800;color:#FFD000}
.btn-rem{background:transparent;border:none;color:#fca5a5;font-size:10px}
.cart-summary{background:#1340b0;border:1px solid rgba(255,255,255,0.15);border-radius:11px;padding:18px}
.cart-total{display:flex;justify-content:space-between;font-size:17px;font-weight:800;margin-bottom:14px}
.cart-total span:last-child{color:#FFD000}
.warn{font-size:12px;color:#fbbf24;margin-bottom:10px;text-align:center}
/* CONFIRM */
.conf-wrap{display:flex;justify-content:center;padding:16px}
.conf-box{text-align:center;max-width:500px;width:100%;background:#1340b0;border:1px solid rgba(255,255,255,0.2);border-radius:18px;padding:24px 18px}
.conf-dets{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:12px;margin-bottom:14px;text-align:left}
.conf-row{display:flex;justify-content:space-between;padding-bottom:5px;margin-bottom:5px;border-bottom:1px solid rgba(255,255,255,0.08)}
.conf-key{color:#c7d9fd;font-size:10px;text-transform:uppercase}
.conf-val{color:#fff;font-weight:500;font-size:11px;text-align:right;max-width:55%;text-transform:uppercase}
/* HISTORY */
.order-card{background:#1340b0;border:1px solid rgba(255,255,255,0.2);border-radius:13px;padding:14px;margin-bottom:10px}
/* STICKY BAR */
.sticky-bar{position:fixed;bottom:0;left:0;right:0;background:#1340b0;border-top:1px solid rgba(255,255,255,0.2);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;z-index:200}
/* LOADING */
#loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:9998}
#loading-overlay.active{display:flex}
.loading-box{background:#1340b0;border-radius:12px;padding:24px 32px;text-align:center;color:#fff}
/* TOAST */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1340b0;border:1px solid #4ade80;color:#4ade80;padding:10px 20px;border-radius:10px;z-index:9999;font-weight:600;font-size:13px;display:none}
/* FOOTER */
footer{display:flex;align-items:center;gap:8px;justify-content:center;padding:16px;border-top:1px solid rgba(255,255,255,0.15);background:#1340b0}
.empty-state{text-align:center;padding:50px 0}
.empty-icon{font-size:44px;margin-bottom:12px}
</style>
</head>
<body>

<!-- LOADING OVERLAY -->

<div id="loading-overlay"><div class="loading-box"><div style="font-size:26px;margin-bottom:8px">&#x23F3;</div><div>Aguarde...</div></div></div>
<!-- TOAST -->
<div id="toast"></div>

<!-- AUTH SCREEN -->

<div id="auth-screen" class="active">
  <img id="auth-logo" style="width:80px;height:80px;border-radius:8px;object-fit:cover;margin-bottom:12px"/>
  <h1 style="font-size:32px;font-weight:900;color:#fff;margin-bottom:22px">Start Zero</h1>

  <!-- SUCCESS -->

  <div id="reg-success" style="display:none;width:100%;max-width:380px;background:#1340b0;border-radius:18px;padding:28px 20px;text-align:center">
    <div style="font-size:48px;margin-bottom:8px">&#x2705;</div>
    <div style="font-size:17px;font-weight:900;color:#FFD000;margin-bottom:6px;text-transform:uppercase">Cadastro Realizado!</div>
    <div id="reg-success-name" style="background:rgba(255,255,255,0.08);border-radius:10px;padding:12px;margin-bottom:20px;font-size:15px;font-weight:800;text-transform:uppercase"></div>
    <button class="btn-primary" onclick="goToApp()">Completar Cadastro &#x2192;</button>
  </div>

  <!-- LOGIN -->

  <div id="login-form" class="auth-box">
    <div class="auth-title">Acessar Conta</div>
    <label class="auth-label">E-mail</label>
    <input type="email" id="login-email" class="auth-input" placeholder="seu@email.com" style="text-transform:lowercase"/>
    <div class="divider"><div></div>ou<div></div></div>
    <label class="auth-label">WhatsApp</label>
    <input type="tel" id="login-whatsapp" class="auth-input" placeholder="(00) 00000-0000" oninput="this.value=maskPhone(this.value)"/>
    <label class="auth-label">Senha *</label>
    <div class="pw-wrap">
      <input type="password" id="login-senha" class="auth-input" placeholder="******"/>
      <button class="pw-toggle" onclick="togglePw('login-senha',this)">ver</button>
    </div>
    <div id="login-err" class="err-msg" style="display:none"></div>
    <button class="btn-primary" onclick="handleLogin()">Entrar &#x2192;</button>
    <button class="btn-link" onclick="showTab('register')">N&#xE3;o tem conta? Cadastre-se</button>
  </div>

  <!-- REGISTER -->

  <div id="register-form" class="auth-box" style="display:none">
    <div class="auth-title">Novo Cadastro</div>
    <label class="auth-label">Raz&#xE3;o Social *</label>
    <input type="text" id="reg-nome" class="auth-input" placeholder="Farm&#xE1;cia Sa&#xFA;de Total Ltda."/>
    <label class="auth-label">CNPJ</label>
    <input type="text" id="reg-cnpj" class="auth-input" placeholder="00.000.000/0000-00" oninput="this.value=maskCnpj(this.value)" maxlength="18"/>
    <label class="auth-label">E-mail *</label>
    <input type="email" id="reg-email" class="auth-input" placeholder="contato@farmacia.com.br" style="text-transform:lowercase"/>
    <label class="auth-label">WhatsApp *</label>
    <input type="tel" id="reg-whatsapp" class="auth-input" placeholder="(00) 00000-0000" oninput="this.value=maskPhone(this.value)"/>
    <label class="auth-label">Senha *</label>
    <div class="pw-wrap">
      <input type="password" id="reg-senha" class="auth-input" placeholder="M&#xED;nimo 6 caracteres"/>
      <button class="pw-toggle" onclick="togglePw('reg-senha',this)">ver</button>
    </div>
    <label class="auth-label">Confirmar Senha *</label>
    <div class="pw-wrap" style="margin-bottom:16px">
      <input type="password" id="reg-confirma" class="auth-input" placeholder="Repita a senha"/>
      <button class="pw-toggle" onclick="togglePw('reg-confirma',this)">ver</button>
    </div>
    <div id="reg-err" class="err-msg" style="display:none"></div>
    <button class="btn-primary" onclick="handleRegister()">Salvar Cadastro</button>
    <button class="btn-link" onclick="showTab('login')">J&#xE1; tem conta? Fazer Login</button>
  </div>
</div>

<!-- MAIN APP -->

<div id="app-screen">
  <header class="hdr">
    <img id="app-logo" class="hdr-logo"/>
    <div class="hdr-center">
      <div class="hdr-title">Start Zero</div>
      <div id="hdr-welcome" class="hdr-sub" style="display:none"></div>
    </div>
    <div class="hdr-right">
      <button class="btn-sair" onclick="handleLogout()">SAIR</button>
      <button class="btn-cart" onclick="setView('cart')">
        &#x1F6D2;<span id="cart-badge" class="cart-badge" style="display:none">0</span>
      </button>
    </div>
  </header>
  <nav id="main-nav">
    <button class="nav-btn active" data-view="client" onclick="setView('client')">Dados</button>
    <button class="nav-btn" data-view="catalog" onclick="setView('catalog')">Cat&#xE1;logo</button>
    <button class="nav-btn" data-view="cart" onclick="setView('cart')">Pedido</button>
    <button class="nav-btn" data-view="history" onclick="setView('history')">Hist&#xF3;rico</button>
  </nav>
  <main id="main-content"></main>
  <div id="sticky-bar" class="sticky-bar" style="display:none">
    <div style="display:flex;align-items:center;gap:9px">
      <img id="sticky-logo" style="width:30px;height:30px;border-radius:4px;object-fit:cover"/>
      <div>
        <div style="font-size:10px;color:#c7d9fd" id="sticky-count"></div>
        <div style="font-size:15px;font-weight:800;color:#FFD000" id="sticky-total"></div>
      </div>
    </div>
    <button class="btn-primary" style="width:auto;padding:9px 18px" onclick="setView('cart')">Ver Pedido &#x2192;</button>
  </div>
  <footer>
    <img id="footer-logo" style="width:20px;height:20px;border-radius:3px;object-fit:cover"/>
    <span style="font-size:12px;color:#c7d9fd">START ZERO &middot; CNPJ 24.453.519/0001-93</span>
  </footer>
</div>

<script>
// ── FIREBASE ──
firebase.initializeApp({
  apiKey:"AIzaSyBR66UYXRE1n8YWUi8H5IMaHp4JEf7tqtE",
  authDomain:"start-zero-a8af0.firebaseapp.com",
  projectId:"start-zero-a8af0"
});
var db=firebase.firestore();

async function sbGet(t,f){
  try{
    var r=db.collection(t);
    if(f){
      if(f.indexOf("email=eq.")>=0){var v=decodeURIComponent(f.split("email=eq.")[1].split("&")[0]);r=r.where("email","==",v);}
      else if(f.indexOf("celular=eq.")>=0){var v=decodeURIComponent(f.split("celular=eq.")[1].split("&")[0]);r=r.where("celular","==",v);}
      else if(f.indexOf("cnpj=eq.")>=0){var v=decodeURIComponent(f.split("cnpj=eq.")[1].split("&")[0]);r=r.where("cnpj","==",v);}
      else if(f.indexOf("cliente_id=eq.")>=0){var v=f.split("cliente_id=eq.")[1].split("&")[0];r=r.where("cliente_id","==",v);}
      else if(f.indexOf("id=eq.")>=0){var id=f.split("id=eq.")[1].split("&")[0];var d=await db.collection(t).doc(id).get();return d.exists?[Object.assign({id:d.id},d.data())]:[]; }
    }
    var s=await r.get();
    return s.docs.map(function(d){return Object.assign({id:d.id},d.data());});
  }catch(e){console.error(e);return[];}
}
async function sbPost(t,data){
  try{var r=await db.collection(t).add(Object.assign({},data,{created_at:new Date().toISOString()}));return Object.assign({id:r.id},data);}
  catch(e){console.error(e);return null;}
}
async function sbPatch(t,f,data){
  try{var id=f.split("id=eq.")[1];await db.collection(t).doc(id).set(data,{merge:true});return true;}
  catch(e){console.error(e);return false;}
}

function validarCNPJ(cnpj){
  var d=cnpj.replace(/\D/g,"");if(d.length!==14)return false;if(/^(\d)\1+$/.test(d))return false;
  var w1=[5,4,3,2,9,8,7,6,5,4,3,2];var w2=[6,5,4,3,2,9,8,7,6,5,4,3,2];
  var s1=w1.reduce(function(a,w,i){return a+parseInt(d[i])*w;},0);var r1=s1%11;var d1=r1<2?0:11-r1;if(d1!==parseInt(d[12]))return false;
  var s2=w2.reduce(function(a,w,i){return a+parseInt(d[i])*w;},0);var r2=s2%11;var d2=r2<2?0:11-r2;return d2===parseInt(d[13]);
}

async function handleRegister(){
  var nome=document.getElementById("reg-nome").value.trim();
  var cnpj=document.getElementById("reg-cnpj").value.trim();
  var email=document.getElementById("reg-email").value.trim();
  var wa=document.getElementById("reg-whatsapp").value;
  var pw=document.getElementById("reg-senha").value;
  var cf=document.getElementById("reg-confirma").value;
  var errEl=document.getElementById("reg-err");
  var emailRe=/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
  var w=wa.replace(/\D/g,"");
  if(!nome){errEl.textContent="Raz\u00e3o Social obrigat\u00f3ria.";errEl.style.display="block";return;}
  if(cnpj&&!validarCNPJ(cnpj)){errEl.textContent="CNPJ inv\u00e1lido.";errEl.style.display="block";return;}
  if(!email||!emailRe.test(email)){errEl.textContent="E-mail inv\u00e1lido.";errEl.style.display="block";return;}
  if(w.length<10||w.length>11){errEl.textContent="WhatsApp inv\u00e1lido.";errEl.style.display="block";return;}
  if(!pw||pw.length<6){errEl.textContent="Senha m\u00ednimo 6 caracteres.";errEl.style.display="block";return;}
  if(pw!==cf){errEl.textContent="Senhas n\u00e3o conferem.";errEl.style.display="block";return;}
  showLoading();
  try{
    if(cnpj){var ex=await sbGet("clientes","cnpj=eq."+encodeURIComponent(cnpj));if(ex&&ex.length>0){errEl.textContent="CNPJ j\u00e1 cadastrado.";errEl.style.display="block";hideLoading();return;}}
    var code="SZ"+new Date().getFullYear()+String(Math.floor(Math.random()*9000)+1000)+(cnpj?cnpj.replace(/\D/g,"").slice(-4):"0000");
    var result=await sbPost("clientes",{client_code:code,cnpj:cnpj||"00.000.000/0000-00",razao:nome,email:email,celular:maskPhone(wa),senha_hash:pw});
    if(!result){errEl.textContent="Erro ao cadastrar.";errEl.style.display="block";hideLoading();return;}
    STATE.clientId=result.id;STATE.clientCode=code;STATE.welcomeName=nome;
    STATE.cl.razao=nome;STATE.cl.email=email;STATE.cl.celular=maskPhone(wa);if(cnpj)STATE.cl.cnpj=cnpj;
    document.getElementById("reg-success-name").textContent=nome+(code?" | C\u00f3digo: "+code:"");
    document.getElementById("reg-success").style.display="block";
    document.getElementById("register-form").style.display="none";
  }catch(e){errEl.textContent="Erro ao cadastrar.";errEl.style.display="block";}
  hideLoading();
}

function getItems(){

function getTotal(items){return items.reduce(function(s,i){return s+i.qty*i.price;},0);}

function validateCl(){
var errs={};var emailRe=/^[^\s@]+@[^\s@]+.[^\s@]{2,}$/;var c=STATE.cl;
if(!c.razao.trim())errs.razao=“Obrigat\u00f3ria”;
if(!c.cnpj.trim())errs.cnpj=“Obrigat\u00f3rio”;else if(!validarCNPJ(c.cnpj))errs.cnpj=“Inv\u00e1lido”;
if(!c.ie.trim())errs.ie=“Obrigat\u00f3ria”;
if(!c.email.trim())errs.email=“Obrigat\u00f3rio”;else if(!emailRe.test(c.email))errs.email=“Inv\u00e1lido”;
if(!c.emailXml.trim())errs.emailXml=“Obrigat\u00f3rio”;else if(!emailRe.test(c.emailXml))errs.emailXml=“Inv\u00e1lido”;
if(!c.telefone.trim()&&!c.celular.trim())errs.telefone=“Informe telefone ou celular”;
if(!c.logradouro.trim())errs.logradouro=“Obrigat\u00f3rio”;
if(!c.cidade.trim())errs.cidade=“Obrigat\u00f3ria”;
if(!c.estado.trim())errs.estado=“Obrigat\u00f3rio”;
STATE.formErrors=errs;return Object.keys(errs).length===0;
}

function updCl(field,val,isCnpj){
if(isCnpj)val=maskCnpj(val);
if(field===“telefone”||field===“celular”)val=maskPhone(val);
STATE.cl[field]=normField(field,val);
if(STATE.formErrors[field])delete STATE.formErrors[field];
renderView();
}
function updClRaw(field,val){STATE.cl[field]=val;renderView();}

function doCep(raw){
var found=lookupCep(raw);
var msg=document.getElementById(“cep-msg”);
if(!found){if(msg)msg.innerHTML=’<span style="color:#fca5a5">CEP n\u00e3o encontrado.</span>’;return;}
if(found.cidade)STATE.cl.cidade=found.cidade;
if(found.estado)STATE.cl.estado=found.estado;
if(found.logradouro)STATE.cl.logradouro=found.logradouro;
if(found.bairro)STATE.cl.bairro=found.bairro;
if(msg)msg.innerHTML=’<span style="color:#4ade80">\u2705 ‘+found.cidade+”/”+found.estado+’</span>’;
renderView();
}

}

function renderConfirm(mc){
var items=STATE.confirmedItems;var total=STATE.confirmedTotal;var ref=STATE.confirmRef;
var rows=[[“Protocolo”,”#”+ref],[“Raz\u00e3o Social”,STATE.cl.razao],[“CNPJ”,STATE.cl.cnpj],[“C\u00f3digo”,STATE.clientCode],[“Pagamento”,STATE.cl.pagamento]].filter(function(a){return a[1];}).map(function(a){return ‘<div class="conf-row"><span class="conf-key">’+a[0]+’</span><span class="conf-val">’+a[1]+’</span></div>’;}).join(””);
var itemRows=items.map(function(it){return ‘<div class="conf-row"><span style="color:#fff;font-size:11px;text-transform:uppercase">’+it.img+’ ‘+it.name+’ x’+it.qty+’</span><span style="color:#FFD000;font-size:11px;font-weight:700">R$ ‘+fmt(it.qty*it.price)+’</span></div>’;}).join(””);
mc.innerHTML=’<div class="conf-wrap"><div class="conf-box">’+
‘<img src="'+LOGO+'" style="width:56px;height:56px;border-radius:7px;object-fit:cover"/>’+
‘<div style="font-size:34px;margin:12px 0 4px">✅</div>’+
‘<h2 style="font-size:20px;font-weight:800;color:#fff;margin:6px 0 14px;text-transform:uppercase">Pedido Confirmado!</h2>’+
‘<div class="conf-dets"><div style="font-size:11px;font-weight:700;color:#FFD000;text-align:center;margin-bottom:8px;text-transform:uppercase">Dados do Cliente</div>’+rows+’</div>’+
‘<div class="conf-dets"><div style="font-size:11px;font-weight:700;color:#FFD000;text-align:center;margin-bottom:8px;text-transform:uppercase">Itens</div>’+itemRows+
‘<div style="display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.15)"><span style="font-weight:700">TOTAL</span><span style="color:#FFD000;font-weight:800;font-size:14px">R$ ‘+fmt(total)+’</span></div></div>’+
‘<div style="display:flex;flex-direction:column;gap:9px">’+
‘<button class="btn-primary" style="background:#FFD000;color:#1340b0" onclick="sendEmail()">Enviar por E-mail</button>’+
‘<button class="btn-primary" onclick="setView('catalog')">Fazer Novo Pedido</button>’+
‘</div></div></div>’;
}

function sendEmail(){
var items=STATE.confirmedItems;var total=STATE.confirmedTotal;var ref=STATE.confirmRef;
var lines=items.map(function(it){return it.name+” x”+it.qty+” = R$ “+fmt(it.qty*it.price);}).join(”\n”);
var txt=“PEDIDO #”+ref+”\nCliente: “+STATE.cl.razao+”\nCNPJ: “+STATE.cl.cnpj+”\n\nITENS:\n”+lines+”\n\nTOTAL: R$ “+fmt(total)+”\n\nStart Zero CNPJ 24.453.519/0001-93”;
window.open(“mailto:”+(STATE.cl.email||””)+”?subject=”+encodeURIComponent(“Pedido #”+ref+” - “+STATE.cl.razao)+”&body=”+encodeURIComponent(txt));
}

function renderHistory(mc){
if(STATE.orderHistory.length===0){
mc.innerHTML=’<h2 style="font-size:22px;font-weight:800;text-align:center;margin-bottom:16px">Meus Pedidos</h2>’+
‘<div class="empty-state"><div class="empty-icon">📦</div><p style="color:#c7d9fd">Nenhum pedido ainda.</p></div>’;
return;
}
var cards=STATE.orderHistory.map(function(o){
var itemsHtml=(o.itens||[]).map(function(it){return ‘<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px"><span>’+(it.img||””)+” “+it.name+” x”+it.qty+’</span><span style="color:#FFD000;font-weight:600">R$ ‘+fmt(it.qty*it.price)+’</span></div>’;}).join(””);
return ‘<div class="order-card">’+
‘<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">’+
‘<div><div style="font-size:12px;font-weight:800;color:#FFD000">Pedido #’+o.ref+’</div><div style="font-size:10px;color:#c7d9fd">’+o.data+’</div></div>’+
‘<div style="text-align:right"><div style="font-size:14px;font-weight:800;color:#FFD000">R$ ‘+(typeof o.total===“number”?fmt(o.total):o.total)+’</div><div style="font-size:9px;color:#4ade80">✅ Confirmado</div></div>’+
‘</div>’+
‘<div style="font-size:10px;color:#c7d9fd;margin-bottom:4px">CLIENTE: <span style="color:#fff;font-weight:600">’+o.cliente+’</span></div>’+
itemsHtml+’</div>’;
}).join(””);
mc.innerHTML=’<h2 style="font-size:22px;font-weight:800;text-align:center;margin-bottom:16px">Meus Pedidos</h2>’+cards;
}

// ── INIT ──
window.addEventListener(“load”,function(){
setLogos();
document.getElementById(“sticky-logo”).src=LOGO;
});
</script>
