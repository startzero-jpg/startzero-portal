<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Start Zero</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a56db;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui}
.box{background:#1340b0;border-radius:16px;padding:28px 24px;width:90%;max-width:380px;color:#fff;text-align:center}
input{width:100%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);border-radius:8px;padding:10px;color:#fff;font-size:14px;margin-bottom:12px;text-align:center;font-family:inherit}
button{width:100%;padding:13px;background:#FFD000;border:none;border-radius:10px;color:#1340b0;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.err{color:#fca5a5;font-size:12px;margin-bottom:10px}
.ok{color:#4ade80;font-size:13px;margin:10px 0}
h2{color:#FFD000;margin-bottom:20px;font-size:16px;text-transform:uppercase;letter-spacing:1px}
</style>
</head>
<body>
<div class="box">
  <img id="logo" style="width:60px;height:60px;border-radius:8px;margin-bottom:12px"/>
  <h1 style="font-size:24px;font-weight:900;margin-bottom:20px">Start Zero</h1>
  <div id="status" class="ok">Conectando ao Firebase...</div>
  <div id="form" style="display:none">
    <h2>Cadastro</h2>
    <input id="nome" placeholder="Razão Social" style="text-transform:uppercase"/>
    <input id="email" type="email" placeholder="E-mail" style="text-transform:lowercase"/>
    <input id="whatsapp" type="tel" placeholder="WhatsApp (00) 00000-0000"/>
    <input id="senha" type="password" placeholder="Senha (mínimo 6 caracteres)"/>
    <div id="errmsg" class="err" style="display:none"></div>
    <button onclick="cadastrar()">Salvar Cadastro</button>
  </div>
</div>

<script>
// Logo
var logo = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==";
document.getElementById('logo').src = logo;

// Firebase
try {
  firebase.initializeApp({
    apiKey:"AIzaSyBR66UYXRE1n8YWUi8H5IMaHp4JEf7tqtE",
    authDomain:"start-zero-a8af0.firebaseapp.com",
    projectId:"start-zero-a8af0"
  });
  var db = firebase.firestore();
  document.getElementById('status').textContent = "✅ Firebase conectado!";
  document.getElementById('form').style.display = 'block';
} catch(err) {
  document.getElementById('status').textContent = "❌ Erro Firebase: " + err.message;
  document.getElementById('status').style.color = '#fca5a5';
}

function maskPhone(v){return v.replace(/\D/g,"").slice(0,11).replace(/(\d{2})(\d)/,"($1) $2").replace(/(\d{4,5})(\d{4})$/,"$1-$2");}

document.getElementById('whatsapp').addEventListener('input',function(){
  this.value = maskPhone(this.value);
});

async function cadastrar(){
  var nome = document.getElementById('nome').value.trim();
  var email = document.getElementById('email').value.trim();
  var whatsapp = document.getElementById('whatsapp').value;
  var senha = document.getElementById('senha').value;
  var errmsg = document.getElementById('errmsg');
  
  if(!nome){errmsg.textContent="Razão Social obrigatória";errmsg.style.display='block';return;}
  if(!email){errmsg.textContent="E-mail obrigatório";errmsg.style.display='block';return;}
  if(!whatsapp||whatsapp.replace(/\D/g,"").length<10){errmsg.textContent="WhatsApp inválido";errmsg.style.display='block';return;}
  if(!senha||senha.length<6){errmsg.textContent="Senha mínimo 6 caracteres";errmsg.style.display='block';return;}
  errmsg.style.display='none';
  
  var btn = document.querySelector('button');
  btn.textContent = 'Salvando...';
  btn.disabled = true;
  
  try {
    var code = "SZ" + new Date().getFullYear() + Math.floor(Math.random()*9000+1000);
    var ref = await db.collection('clientes').add({
      client_code: code,
      razao: nome,
      email: email,
      celular: whatsapp,
      senha_hash: senha,
      cnpj: "00.000.000/0000-00",
      created_at: new Date().toISOString()
    });
    document.getElementById('status').textContent = "✅ Cadastro salvo! ID: " + ref.id + " | Código: " + code;
    document.getElementById('status').style.color = '#4ade80';
    document.getElementById('form').style.display = 'none';
  } catch(err) {
    errmsg.textContent = "Erro ao salvar: " + err.message;
    errmsg.style.display = 'block';
    btn.textContent = 'Salvar Cadastro';
    btn.disabled = false;
  }
}
</script>

</body>
</html>
