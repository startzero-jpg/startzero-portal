<script>
var e=React.createElement;
firebase.initializeApp({apiKey:"AIzaSyBR66UYXRE1n8YWUi8H5IMaHp4JEf7tqtE",authDomain:"start-zero-a8af0.firebaseapp.com",projectId:"start-zero-a8af0"});
var db=firebase.firestore();
async function sbGet(t,f){
  try{
    var r=db.collection(t);
    if(f){
      if(f.indexOf("email=eq.")>=0){var v=decodeURIComponent(f.split("email=eq.")[1].split("&")[0]);r=r.where("email","==",v);}
      else if(f.indexOf("celular=eq.")>=0){var v=decodeURIComponent(f.split("celular=eq.")[1].split("&")[0]);r=r.where("celular","==",v);}
      else if(f.indexOf("cnpj=eq.")>=0){var v=decodeURIComponent(f.split("cnpj=eq.")[1].split("&")[0]);r=r.where("cnpj","==",v);}
      else if(f.indexOf("cliente_id=eq.")>=0){var v=f.split("cliente_id=eq.")[1].split("&")[0];r=r.where("cliente_id","==",v);}
      else if(f.indexOf("id=eq.")>=0){var id=f.split("id=eq.")[1].split("&")[0];var d=await db.collection(t).doc(id).get();return d.exists?[Object.assign({id:d.id},d.data())]:[];}
    }
    var s=await r.get();
    return s.docs.map(function(d){return Object.assign({id:d.id},d.data());});
  }catch(err){console.error(err);return[];}
}
async function sbPost(t,data){
  try{var r=await db.collection(t).add(Object.assign({},data,{created_at:new Date().toISOString()}));return[Object.assign({id:r.id},data)];}
  catch(err){console.error(err);return null;}
}
async function sbPatch(t,f,data){
  try{var id=f.split("id=eq.")[1];await db.collection(t).doc(id).set(data,{merge:true});return true;}
  catch(err){console.error(err);return false;}
}

async function handleRegister(){

var w=regData.whatsapp.replace(/\D/g,””);
var errs={};
if(!regData.nome.trim())errs.nome=“Obrigat\u00f3ria”;
if(regData.cnpj.trim()&&!validarCNPJ(regData.cnpj))errs.cnpj=“CNPJ inv\u00e1lido”;
if(!regData.email.trim())errs.email=“Obrigat\u00f3rio”;

if(!regData.whatsapp.trim())errs.whatsapp=“Obrigat\u00f3rio”;

else if(regData.senha!==regData.confirmSenha)errs.confirmSenha=“Senhas n\u00e3o conferem”;
if(Object.keys(errs).length>0){setRegErrors(errs);return;}
setRegErrors({});setLoading(true);
try{
if(regData.cnpj.trim()){var ex=await sbGet(“clientes”,“cnpj=eq.”+encodeURIComponent(regData.cnpj));if(ex&&ex.length>0){setRegErrors({cnpj:“CNPJ j\u00e1 cadastrado.”});setLoading(false);return;}}
var nome=regData.nome.trim();

var code=“SZ”+new Date().getFullYear()+String(Math.floor(Math.random()*9000)+1000)+cnpjD.slice(-4);

}
