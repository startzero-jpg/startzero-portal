<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a56db;
  --card:#1340b0;
  --gold:#FFD000;
  --gold2:#ffe44d;
  --white:#ffffff;
  --gray:rgba(255,255,255,0.55);
  --border:rgba(255,255,255,0.15);
  --danger:#ff5a5a;
  --success:#4de89a;
}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--white);min-height:100vh}
input,select,textarea{font-family:'Barlow',sans-serif}

/* SCROLLBAR */

::-webkit-scrollbar-track{background:var(--card)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

/* UTILS */

.gold{color:var(--gold)}
.gray{color:var(--gray)}

.success{color:var(--success)}
.upper{text-transform:uppercase}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;

}

/* INPUT */
.field{margin-bottom:16px}
.field label{
  display:block;
  font-size:11px;font-weight:700;
  letter-spacing:1.2px;text-transform:uppercase;

}
.field input,.field select{
  width:100%;
  background:rgba(255,255,255,0.08);

.field input::placeholder{color:rgba(255,255,255,0.3);text-transform:none}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field input.err{border-color:var(--danger)}
.field .hint{font-size:11px;color:var(--danger);margin-top:4px}

/* GRID 2-3 */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}}

/* PEDIDO ITEM ROW */
.ped-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;

.ped-row:last-child{border-bottom:none}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function fmtMoeda(v) {
  return 'R$ ' + Number(v).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function validarCNPJ(cnpj) {
  const c = cnpj.replace(/\D/g, '');
  if (c.length !== 14) return false;
  // Rejeita sequências iguais
  let allSame = true;
  for (let i = 1; i < c.length; i++) {
    if (c[i] !== c[0]) { allSame = false; break; }
  }
  if (allSame) return false;

  function calcDigit(s, n) {
    let sum = 0;
    let pos = n - 7;
    for (let i = n; i >= 1; i--) {
      sum += parseInt(s[n - i]) * pos;
      pos--;
      if (pos < 2) pos = 9;
    }
    const r = sum % 11;
    return r < 2 ? 0 : 11 - r;
  }
  return calcDigit(c, 12) === parseInt(c[12]) && calcDigit(c, 13) === parseInt(c[13]);
}

function maskCNPJ(v) {
  const d = v.replace(/\D/g, '').slice(0, 14);
  if (d.length <= 2)  return d;
  if (d.length <= 5)  return d.slice(0,2) + '.' + d.slice(2);
  if (d.length <= 8)  return d.slice(0,2) + '.' + d.slice(2,5) + '.' + d.slice(5);
  if (d.length <= 12) return d.slice(0,2) + '.' + d.slice(2,5) + '.' + d.slice(5,8) + '/' + d.slice(8);
  return d.slice(0,2) + '.' + d.slice(2,5) + '.' + d.slice(5,8) + '/' + d.slice(8,12) + '-' + d.slice(12);
}

function maskCEP(v) {
  const d = v.replace(/\D/g, '').slice(0, 8);
  if (d.length <= 5) return d;
  return d.slice(0, 5) + '-' + d.slice(5);
}

function rawCNPJ(v) { return v.replace(/\D/g, ''); }
function rawCEP(v)  { return v.replace(/\D/g, ''); }

async function buscarCEP(cep) {
  const c = rawCEP(cep);
  if (c.length !== 8) return null;
  try {
    const r = await fetch('https://viacep.com.br/ws/' + c + '/json/');
    const d = await r.json();
    if (d.erro) return null;
    return d;
  } catch {
    return null;
  }
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
const { useState, useEffect, useCallback, useRef } = React;

function useToast() {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, tipo = 'ok') => {
    setToast({ msg, tipo });
    setTimeout(() => setToast(null), 3000);
  }, []);
  return { toast, show };
}

function Toast({ toast }) {
  if (!toast) return null;
  const cls = toast.tipo === 'ok' ? 'toast-ok' : toast.tipo === 'err' ? 'toast-err' : 'toast-info';
  return <div className={`toast ${cls}`}>{toast.msg}</div>;
}

// ═══════════════════════════════════════════════
// TELA DE LOGIN / REGISTRO
// ═══════════════════════════════════════════════
function TelaAuth({ onLogin }) {
  const [modo, setModo] = useState('login'); // 'login' | 'register'
  const [cnpj, setCnpj] = useState('');
  const [senha, setSenha] = useState('');
  const [nome, setNome] = useState('');
  const [erros, setErros] = useState({});
  const [loading, setLoading] = useState(false);
  const { toast, show } = useToast();

  function validar() {
    const e = {};
    const raw = rawCNPJ(cnpj);
    if (!raw) e.cnpj = 'CNPJ obrigatório';
    else if (raw.length !== 14) e.cnpj = 'CNPJ deve ter 14 dígitos';
    else if (!validarCNPJ(raw)) e.cnpj = 'CNPJ inválido';
    if (!senha || senha.length < 6) e.senha = 'Mínimo 6 caracteres';
    if (modo === 'register' && !nome.trim()) e.nome = 'Nome obrigatório';
    setErros(e);
    return Object.keys(e).length === 0;
  }

  async function handleSubmit() {
    if (!validar()) return;
    setLoading(true);
    const raw = rawCNPJ(cnpj);
    try {
      if (modo === 'login') {
        const snap = await db.collection('clientes').where('cnpj', '==', raw).limit(1).get();
        if (snap.empty) { show('CNPJ não encontrado', 'err'); setLoading(false); return; }
        const doc = snap.docs[0];
        const data = doc.data();
        if (data.senha !== senha) { show('Senha incorreta', 'err'); setLoading(false); return; }
        onLogin({ id: doc.id, ...data });
      } else {
        const snap = await db.collection('clientes').where('cnpj', '==', raw).limit(1).get();
        if (!snap.empty) { show('CNPJ já cadastrado', 'err'); setLoading(false); return; }
        const doc = await db.collection('clientes').add({
          cnpj: raw, senha, nome: nome.toUpperCase().trim(),
          razao: '', email: '', telefone: '',
          cep: '', logradouro: '', numero: '', complemento: '',
          bairro: '', cidade: '', uf: '',
          ie: '', regime: '',
          criadoEm: new Date().toISOString(),
        });
        const novo = { id: doc.id, cnpj: raw, nome: nome.toUpperCase().trim() };
        show('Cadastro realizado!', 'ok');
        setTimeout(() => onLogin(novo), 800);
      }
    } catch (err) {
      show('Erro: ' + err.message, 'err');
    }
    setLoading(false);
  }

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'20px' }}>
      <Toast toast={toast} />
      <div style={{ marginBottom:'32px', textAlign:'center' }}>
        <div style={{ width:64, height:64, background:'var(--gold)', borderRadius:16, display:'grid', placeItems:'center', margin:'0 auto 14px', fontFamily:'Barlow Condensed', fontWeight:800, fontSize:26, color:'#0b1a3a' }}>SZ</div>
        <div className="bc" style={{ fontSize:28, fontWeight:800 }}>START <span className="gold">ZERO</span></div>
        <div style={{ fontSize:12, color:'var(--gray)', textTransform:'uppercase', letterSpacing:1.5, marginTop:4 }}>Portal B2B · Distribuidora</div>
      </div>

      <div className="card" style={{ width:'100%', maxWidth:420 }}>
        <div style={{ display:'flex', gap:8, marginBottom:24 }}>
          <button className={`btn btn-sm ${modo==='login' ? 'btn-gold' : 'btn-ghost'}`} style={{ flex:1 }} onClick={() => { setModo('login'); setErros({}); }}>ENTRAR</button>
          <button className={`btn btn-sm ${modo==='register' ? 'btn-gold' : 'btn-ghost'}`} style={{ flex:1 }} onClick={() => { setModo('register'); setErros({}); }}>CADASTRAR</button>
        </div>

        {modo === 'register' && (
          <div className="field">
            <label>Nome da Farmácia</label>
            <input placeholder="Nome fantasia" value={nome} onChange={e => setNome(e.target.value.toUpperCase())} className={erros.nome ? 'err' : ''} />
            {erros.nome && <div className="hint">{erros.nome}</div>}
          </div>
        )}

        <div className="field">
          <label>CNPJ</label>
          <input placeholder="00.000.000/0000-00" value={cnpj} onChange={e => setCnpj(maskCNPJ(e.target.value))} className={erros.cnpj ? 'err' : ''} maxLength={18} />
          {erros.cnpj && <div className="hint">{erros.cnpj}</div>}
        </div>

        <div className="field" style={{ marginBottom:24 }}>
          <label>Senha</label>
          <input type="password" placeholder="••••••" value={senha} onChange={e => setSenha(e.target.value)} className={erros.senha ? 'err' : ''} />
          {erros.senha && <div className="hint">{erros.senha}</div>}
        </div>

        <button className="btn btn-gold btn-full" onClick={handleSubmit} disabled={loading}>
          {loading ? <span className="spin"/> : (modo === 'login' ? 'ENTRAR' : 'CRIAR CONTA')}
        </button>
      </div>

      <div style={{ marginTop:40, fontSize:11, color:'var(--gray)', textTransform:'uppercase', letterSpacing:1 }}>
        © {new Date().getFullYear()} START ZERO LTDA · TODOS OS DIREITOS RESERVADOS
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
// ABA: DADOS DO CLIENTE
// ═══════════════════════════════════════════════
function TabaDados({ cliente, setCliente, show }) {
  const [form, setForm] = useState({
    razao:       cliente.razao       || '',
    email:       cliente.email       || '',
    telefone:    cliente.telefone    || '',
    ie:          cliente.ie          || '',
    regime:      cliente.regime      || '',
    cep:         cliente.cep ? maskCEP(cliente.cep) : '',
    logradouro:  cliente.logradouro  || '',
    numero:      cliente.numero      || '',
    complemento: cliente.complemento || '',
    bairro:      cliente.bairro      || '',
    cidade:      cliente.cidade      || '',
    uf:          cliente.uf          || '',
  });
  const [saving, setSaving] = useState(false);
  const [cepLoading, setCepLoading] = useState(false);

  function upForm(field, val) {
    setForm(f => ({ ...f, [field]: val.toUpperCase() }));
  }

  async function handleCEP(val) {
    const masked = maskCEP(val);
    setForm(f => ({ ...f, cep: masked }));
    if (rawCEP(val).length === 8) {
      setCepLoading(true);
      const data = await buscarCEP(val);
      if (data) {
        setForm(f => ({
          ...f,
          logradouro:  (data.logradouro || '').toUpperCase(),
          bairro:      (data.bairro     || '').toUpperCase(),
          cidade:      (data.localidade || '').toUpperCase(),
          uf:          (data.uf         || '').toUpperCase(),
        }));
        show('Endereço preenchido!', 'ok');
      } else {
        show('CEP não encontrado', 'err');
      }
      setCepLoading(false);
    }
  }

  async function salvar() {
    setSaving(true);
    try {
      const dados = {
        razao:       form.razao,
        email:       form.email,
        telefone:    form.telefone,
        ie:          form.ie,
        regime:      form.regime,
        cep:         rawCEP(form.cep),
        logradouro:  form.logradouro,
        numero:      form.numero,
        complemento: form.complemento,
        bairro:      form.bairro,
        cidade:      form.cidade,
        uf:          form.uf,
      };
      await db.collection('clientes').doc(cliente.id).update(dados);
      setCliente(c => ({ ...c, ...dados }));
      show('Dados salvos com sucesso!', 'ok');
    } catch (err) {
      show('Erro ao salvar: ' + err.message, 'err');
    }
    setSaving(false);
  }

  return (
    <div className="page">
      <div className="sec-title">Dados da <span className="gold">Farmácia</span></div>
      <div className="sec-sub">CNPJ: {maskCNPJ(cliente.cnpj)}</div>

      <div className="card" style={{ marginBottom:16 }}>
        <div style={{ fontFamily:'Barlow Condensed', fontWeight:700, fontSize:13, letterSpacing:2, color:'var(--gold)', marginBottom:16, textTransform:'uppercase' }}>· Informações Gerais</div>
        <div className="grid2">
          <div className="field"><label>Razão Social</label><input value={form.razao} onChange={e => upForm('razao', e.target.value)} placeholder="Razão social da empresa"/></div>
          <div className="field"><label>E-mail</label><input value={form.email} onChange={e => setForm(f => ({...f, email: e.target.value}))} placeholder="contato@farmacia.com.br" style={{ textTransform:'none' }}/></div>
          <div className="field"><label>Telefone</label><input value={form.telefone} onChange={e => upForm('telefone', e.target.value)} placeholder="(11) 99999-9999"/></div>
          <div className="field"><label>Inscrição Estadual</label><input value={form.ie} onChange={e => upForm('ie', e.target.value)} placeholder="Número da IE"/></div>
          <div className="field">
            <label>Regime Tributário</label>
            <select value={form.regime} onChange={e => setForm(f => ({...f, regime: e.target.value}))}>
              <option value="">SELECIONE</option>
              <option value="SIMPLES NACIONAL">SIMPLES NACIONAL</option>
              <option value="LUCRO PRESUMIDO">LUCRO PRESUMIDO</option>
              <option value="LUCRO REAL">LUCRO REAL</option>
              <option value="MEI">MEI</option>
            </select>
          </div>
        </div>
      </div>

      <div className="card" style={{ marginBottom:24 }}>
        <div style={{ fontFamily:'Barlow Condensed', fontWeight:700, fontSize:13, letterSpacing:2, color:'var(--gold)', marginBottom:16, textTransform:'uppercase' }}>· Endereço</div>
        <div className="grid2">
          <div className="field">
            <label>Bairro</label>
            <input value={form.bairro} onChange={e => upForm('bairro', e.target.value)} placeholder="Bairro"/>
          </div>
          <div className="field">
            <label>CEP {cepLoading && <span className="spin" style={{ width:12, height:12, border:'1.5px solid rgba(255,255,255,.2)', borderTopColor:'var(--gold)' }}/>}</label>
            <input value={form.cep} onChange={e => handleCEP(e.target.value)} placeholder="00000-000" maxLength={9}/>
          </div>
          <div className="field"><label>Logradouro</label><input value={form.logradouro} onChange={e => upForm('logradouro', e.target.value)} placeholder="Rua, Avenida..."/></div>
          <div className="field"><label>Número</label><input value={form.numero} onChange={e => upForm('numero', e.target.value)} placeholder="Nº"/></div>
          <div className="field"><label>Complemento</label><input value={form.complemento} onChange={e => upForm('complemento', e.target.value)} placeholder="Sala, Loja..."/></div>
          <div className="field"><label>Cidade</label><input value={form.cidade} onChange={e => upForm('cidade', e.target.value)} placeholder="Cidade"/></div>
          <div className="field">
            <label>UF</label>
            <select value={form.uf} onChange={e => setForm(f => ({...f, uf: e.target.value}))}>
              <option value="">UF</option>
              {ESTADOS.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        </div>
      </div>

      <button className="btn btn-gold" onClick={salvar} disabled={saving}>
        {saving ? <><span className="spin"/> SALVANDO...</> : '✓ SALVAR DADOS'}
      </button>
    </div>
  );
}

// ═══════════════════════════════════════════════
// ABA: CATÁLOGO + PEDIDO
// ═══════════════════════════════════════════════
function TabaCatalogo({ cliente, show }) {
  const cats = ['TOALHAS UMEDECIDAS', 'FRALDAS INFANTIS', 'FRALDAS ADULTO'];
  const [catAtiva, setCatAtiva] = useState('TOALHAS UMEDECIDAS');
  const [qtds, setQtds] = useState({});
  const [salvando, setSalvando] = useState(false);
  const [etapa, setEtapa] = useState('catalogo'); // 'catalogo' | 'resumo'

  const prodsFiltrados = PRODUTOS.filter(p => p.cat === catAtiva);

  function setQtd(id, val) {
    const n = Math.max(0, parseInt(val) || 0);
    setQtds(q => ({ ...q, [id]: n }));
  }

  const itensCarrinho = PRODUTOS.filter(p => (qtds[p.id] || 0) > 0);
  const totalGeral = itensCarrinho.reduce((s, p) => s + p.preco * (qtds[p.id] || 0), 0);

  async function confirmarPedido() {
    if (!itensCarrinho.length) { show('Adicione pelo menos 1 produto', 'err'); return; }
    setSalvando(true);
    try {
      const itens = itensCarrinho.map(p => ({
        id: p.id, nome: p.nome, cat: p.cat,
        qtd: qtds[p.id], preco: p.preco,
        subtotal: p.preco * qtds[p.id],
      }));
      const pedido = {
        clienteId:   cliente.id,
        cnpj:        cliente.cnpj,
        nomeCliente: cliente.nome || cliente.razao || '',
        itens,
        total:       totalGeral,
        status:      'CONFIRMADO',
        criadoEm:    new Date().toISOString(),
      };
      const ref = await db.collection('pedidos').add(pedido);
      gerarPDF({ ...pedido, id: ref.id });
      show('Pedido confirmado! PDF gerado.', 'ok');
      setQtds({});
      setEtapa('catalogo');
    } catch (err) {
      show('Erro ao salvar pedido: ' + err.message, 'err');
    }
    setSalvando(false);
  }

  function gerarPDF(pedido) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const azul = [26, 86, 219];
    const gold = [255, 208, 0];

    // Header
    doc.setFillColor(...azul);
    doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(255, 208, 0);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(22);
    doc.text('START ZERO', 14, 18);
    doc.setFontSize(10);
    doc.setTextColor(255, 255, 255);
    doc.text('DISTRIBUIDORA START ZERO LTDA', 14, 26);
    doc.text('PORTAL B2B - PEDIDO DE COMPRA', 14, 33);

    // Número do pedido
    doc.setTextColor(255, 208, 0);
    doc.setFontSize(11);
    doc.text('PEDIDO #' + pedido.id.slice(-6).toUpperCase(), 196, 18, { align: 'right' });
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(9);
    const dataStr = new Date(pedido.criadoEm).toLocaleDateString('pt-BR');
    doc.text(dataStr, 196, 26, { align: 'right' });

    // Dados do cliente
    let y = 52;
    doc.setTextColor(26, 86, 219);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.text('CLIENTE', 14, y);
    doc.setDrawColor(...azul);
    doc.line(14, y + 2, 196, y + 2);
    y += 10;
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(50, 50, 50);
    doc.setFontSize(9);
    doc.text('CNPJ: ' + maskCNPJ(pedido.cnpj), 14, y); y += 6;
    if (pedido.nomeCliente) { doc.text('NOME: ' + pedido.nomeCliente, 14, y); y += 6; }

    // Itens
    y += 6;
    doc.setTextColor(26, 86, 219);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.text('ITENS DO PEDIDO', 14, y);
    doc.line(14, y + 2, 196, y + 2);
    y += 10;

    // Cabeçalho tabela
    doc.setFillColor(26, 86, 219);
    doc.rect(14, y - 5, 182, 8, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(8);
    doc.text('PRODUTO', 16, y);
    doc.text('QTD', 130, y);
    doc.text('UNIT.', 150, y);
    doc.text('SUBTOTAL', 175, y);
    y += 6;

    doc.setFont('helvetica', 'normal');
    let linhaAlt = false;
    pedido.itens.forEach(function(item) {
      if (linhaAlt) {
        doc.setFillColor(240, 244, 255);
        doc.rect(14, y - 4, 182, 7, 'F');
      }
      linhaAlt = !linhaAlt;
      doc.setTextColor(50, 50, 50);
      doc.text(item.nome.substring(0, 45), 16, y);
      doc.text(String(item.qtd), 130, y);
      doc.text(fmtMoeda(item.preco), 145, y);
      doc.text(fmtMoeda(item.subtotal), 171, y);
      y += 8;
    });

    // Total
    y += 6;
    doc.setFillColor(...gold);
    doc.rect(120, y - 5, 76, 12, 'F');
    doc.setTextColor(11, 26, 58);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.text('TOTAL: ' + fmtMoeda(pedido.total), 196, y + 2, { align: 'right' });

    // Footer
    doc.setTextColor(150, 150, 150);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.text('DOCUMENT GERADO AUTOMATICAMENTE PELO PORTAL B2B START ZERO', 105, 285, { align: 'center' });

    doc.save('pedido-startzero-' + pedido.id.slice(-6) + '.pdf');
  }

  if (etapa === 'resumo') {
    return (
      <div className="page">
        <div className="sec-title">Resumo do <span className="gold">Pedido</span></div>
        <div className="sec-sub">Confira antes de confirmar</div>

        <div className="card" style={{ marginBottom:16 }}>
          {itensCarrinho.length === 0
            ? <div className="empty"><div className="empty-icon">🛒</div><div>Carrinho vazio</div></div>
            : itensCarrinho.map(p => (
              <div key={p.id} className="ped-row">
                <span style={{ fontSize:14 }}>{p.icon} {p.nome}</span>
                <span style={{ color:'var(--gray)', fontSize:13 }}>{qtds[p.id]}x {fmtMoeda(p.preco)}</span>
                <span style={{ fontWeight:700, color:'var(--gold)' }}>{fmtMoeda(p.preco * qtds[p.id])}</span>
              </div>
            ))
          }
          <div className="total-box">
            <div><div className="total-label">Total do Pedido</div><div style={{ fontSize:11, color:'var(--gray)' }}>{itensCarrinho.length} produto(s)</div></div>
            <div className="total-value">{fmtMoeda(totalGeral)}</div>
          </div>
        </div>

        <div style={{ display:'flex', gap:12 }}>
          <button className="btn btn-ghost" onClick={() => setEtapa('catalogo')}>← VOLTAR</button>
          <button className="btn btn-gold" style={{ flex:1 }} onClick={confirmarPedido} disabled={salvando || !itensCarrinho.length}>
            {salvando ? <><span className="spin"/> SALVANDO...</> : '✓ CONFIRMAR E GERAR PDF'}
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="page">
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:20 }}>
        <div>
          <div className="sec-title">Catálogo <span className="gold">de Produtos</span></div>
          <div className="sec-sub">Selecione os produtos e quantidades</div>
        </div>
        {itensCarrinho.length > 0 && (
          <button className="btn btn-gold btn-sm" onClick={() => setEtapa('resumo')}>
            🛒 VER PEDIDO ({itensCarrinho.length})
          </button>
        )}
      </div>

      {/* Categoria tabs */}
      <div style={{ display:'flex', gap:8, marginBottom:20, flexWrap:'wrap' }}>
        {cats.map(cat => (
          <button key={cat} className={`btn btn-sm ${catAtiva === cat ? 'btn-gold' : 'btn-ghost'}`} onClick={() => setCatAtiva(cat)}>
            {cat}
          </button>
        ))}
      </div>

      <div className="grid3">
        {prodsFiltrados.map(p => (
          <div key={p.id} className="prod-card">
            <div className="prod-icon">{p.icon}</div>
            <div className="prod-name">{p.nome}</div>
            <div className="prod-price">{fmtMoeda(p.preco)} <small>/{p.unid}</small></div>
            <div className="qty-row">
              <button className="qty-btn" onClick={() => setQtd(p.id, (qtds[p.id] || 0) - 1)}>−</button>
              <span className="qty-num">{qtds[p.id] || 0}</span>
              <button className="qty-btn" onClick={() => setQtd(p.id, (qtds[p.id] || 0) + 1)}>+</button>
              {(qtds[p.id] || 0) > 0 && <span style={{ fontSize:12, color:'var(--gold)', marginLeft:4 }}>✓</span>}
            </div>
          </div>
        ))}
      </div>

      {itensCarrinho.length > 0 && (
        <div style={{ marginTop:24 }}>
          <div className="total-box">
            <div><div className="total-label">Total Selecionado</div><div style={{ fontSize:11, color:'var(--gray)' }}>{itensCarrinho.length} tipo(s) de produto</div></div>
            <div className="total-value">{fmtMoeda(totalGeral)}</div>
          </div>
          <button className="btn btn-gold btn-full" style={{ marginTop:12 }} onClick={() => setEtapa('resumo')}>
            VER RESUMO DO PEDIDO →
          </button>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════
// ABA: MEUS PEDIDOS
// ═══════════════════════════════════════════════
function TabaPedidos({ cliente }) {
  const [pedidos, setPedidos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [aberto, setAberto] = useState(null);

  useEffect(() => {
    const unsub = db.collection('pedidos')
      .where('clienteId', '==', cliente.id)
      .orderBy('criadoEm', 'desc')
      .limit(30)
      .onSnapshot(snap => {
        const lista = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        setPedidos(lista);
        setLoading(false);
      }, () => setLoading(false));
    return () => unsub();
  }, [cliente.id]);

  if (loading) return <div className="page" style={{ textAlign:'center', paddingTop:60 }}><span className="spin"/></div>;

  return (
    <div className="page">
      <div className="sec-title">Meus <span className="gold">Pedidos</span></div>
      <div className="sec-sub">{pedidos.length} pedido(s) encontrado(s)</div>

      {pedidos.length === 0
        ? <div className="empty"><div className="empty-icon">📋</div><div>Nenhum pedido ainda</div><div style={{ fontSize:12, marginTop:6 }}>Faça seu primeiro pedido no catálogo</div></div>
        : pedidos.map(p => (
          <div key={p.id} className="card" style={{ marginBottom:12, cursor:'pointer' }} onClick={() => setAberto(aberto === p.id ? null : p.id)}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <div>
                <div style={{ fontFamily:'Barlow Condensed', fontWeight:700, fontSize:15 }}>PEDIDO #{p.id.slice(-6).toUpperCase()}</div>
                <div style={{ fontSize:12, color:'var(--gray)', marginTop:2 }}>
                  {new Date(p.criadoEm).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })}
                </div>
              </div>
              <div style={{ textAlign:'right' }}>
                <div style={{ fontWeight:700, color:'var(--gold)', fontFamily:'Barlow Condensed', fontSize:18 }}>{fmtMoeda(p.total)}</div>
                <span className="badge badge-green">{p.status}</span>
              </div>
            </div>

            {aberto === p.id && (
              <div style={{ marginTop:12, borderTop:'1px solid var(--border)', paddingTop:12 }}>
                {(p.itens || []).map((item, i) => (
                  <div key={i} className="ped-row">
                    <span style={{ fontSize:13 }}>{item.nome}</span>
                    <span style={{ color:'var(--gray)', fontSize:12 }}>{item.qtd}x</span>
                    <span style={{ color:'var(--gold)', fontSize:13, fontWeight:700 }}>{fmtMoeda(item.subtotal)}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))
      }
    </div>
  );
}

// ═══════════════════════════════════════════════
// APP PRINCIPAL
// ═══════════════════════════════════════════════
function App() {
  const [cliente, setCliente] = useState(null);
  const [aba, setAba] = useState('dados');
  const { toast, show } = useToast();

  if (!cliente) {
    return <TelaAuth onLogin={c => { setCliente(c); setAba('dados'); }} />;
  }

  const abas = [
    { id:'dados',    label:'DADOS DA FARMÁCIA' },
    { id:'catalogo', label:'CATÁLOGO'           },
    { id:'pedidos',  label:'MEUS PEDIDOS'       },
  ];

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column' }}>
      <Toast toast={toast} />

      {/* HEADER */}
      <div className="header">
        <div className="logo">
          <div className="logo-badge">SZ</div>
          <div className="logo-name">START <span>ZERO</span></div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ fontSize:12, color:'var(--gray)', textAlign:'right' }}>
            <div style={{ color:'var(--white)', fontWeight:600 }}>{cliente.nome || cliente.razao || 'FARMÁCIA'}</div>
            <div>{maskCNPJ(cliente.cnpj)}</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={() => setCliente(null)}>SAIR</button>
        </div>
      </div>

      {/* TABS */}
      <div className="tabs">
        {abas.map(a => (
          <div key={a.id} className={`tab ${aba === a.id ? 'active' : ''}`} onClick={() => setAba(a.id)}>
            {a.label}
          </div>
        ))}
      </div>

      {/* CONTEÚDO */}
      <div style={{ flex:1 }}>
        {aba === 'dados'    && <TabaDados    cliente={cliente} setCliente={setCliente} show={show} />}
        {aba === 'catalogo' && <TabaCatalogo cliente={cliente} show={show} />}
        {aba === 'pedidos'  && <TabaPedidos  cliente={cliente} />}
      </div>

      {/* FOOTER */}
      <div style={{
        textAlign:'center', padding:'16px 20px',
        borderTop:'1px solid var(--border)',
        fontSize:10, color:'var(--gray)',
        textTransform:'uppercase', letterSpacing:1.5,
      }}>
        © {new Date().getFullYear()} START ZERO LTDA · DISTRIBUIDORA DE HIGIENE PESSOAL · TODOS OS DIREITOS RESERVADOS
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
