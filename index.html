// Firebase helper functions (replaces sbGet/sbPost/sbPatch)
async function sbGet(table, filters) {
  try {
    let ref = db.collection(table);
    if(filters) {
      if(filters.includes("email=eq.")) {
        const val = decodeURIComponent(filters.split("email=eq.")[1].split("&")[0]);
        ref = ref.where("email","==",val);
      } else if(filters.includes("celular=eq.")) {
        const val = decodeURIComponent(filters.split("celular=eq.")[1].split("&")[0]);
        ref = ref.where("celular","==",val);
      } else if(filters.includes("cnpj=eq.")) {
        const val = decodeURIComponent(filters.split("cnpj=eq.")[1].split("&")[0]);
        ref = ref.where("cnpj","==",val);
      } else if(filters.includes("cliente_id=eq.")) {
        const val = filters.split("cliente_id=eq.")[1].split("&")[0];
        ref = ref.where("cliente_id","==",val);
      } else if(filters.includes("id=eq.")) {
        const id = filters.split("id=eq.")[1].split("&")[0];
        const doc = await db.collection(table).doc(id).get();
        return doc.exists ? [{id: doc.id, ...doc.data()}] : [];
      }
    }
    const snap = await ref.get();
    return snap.docs.map(d => ({id: d.id, ...d.data()}));
  } catch(e) { console.error("sbGet error:", e); return []; }
}

async function sbPost(table, data) {
  try {
    const ref = await db.collection(table).add({...data, created_at: new Date().toISOString()});
    return [{id: ref.id, ...data}];
  } catch(e) { console.error("sbPost error:", e); return null; }
}

async function sbPatch(table, filter, data) {
  try {
    const id = filter.split("id=eq.")[1];
    await db.collection(table).doc(id).set(data, {merge: true});
    return true;
  } catch(e) { console.error("sbPatch error:", e); return false; }
}

const FB_URL = “https://firestore.googleapis.com/v1/projects/start-zero-a8af0/databases/(default)/documents”;

async function fbGetToken() {
// Use Firebase REST API with API key - no auth needed in test mode
return FB_CONFIG.apiKey;
}

function fbToObj(doc) {
// Convert Firestore document fields to plain object
if(!doc || !doc.fields) return null;
const obj = { id: doc.name ? doc.name.split(”/”).pop() : “” };
for(const [k,v] of Object.entries(doc.fields)) {
if(v.stringValue !== undefined)  obj[k] = v.stringValue;
else if(v.integerValue !== undefined) obj[k] = Number(v.integerValue);
else if(v.doubleValue !== undefined)  obj[k] = Number(v.doubleValue);
else if(v.booleanValue !== undefined) obj[k] = v.booleanValue;
else if(v.timestampValue !== undefined) obj[k] = v.timestampValue;
else if(v.arrayValue !== undefined) obj[k] = (v.arrayValue.values||[]).map(i=>i.stringValue||i.integerValue||””);
else obj[k] = “”;
}
return obj;
}

function objToFb(obj) {
// Convert plain object to Firestore fields
const fields = {};
for(const [k,v] of Object.entries(obj)) {
if(v === null || v === undefined) continue;
if(typeof v === “number”) fields[k] = { doubleValue: v };
else if(typeof v === “boolean”) fields[k] = { booleanValue: v };
else fields[k] = { stringValue: String(v) };
}
return { fields };
}

async function fbGet(collection, docId=””) {
try {
const url = docId
? `${FB_URL}/${collection}/${docId}`
: `${FB_URL}/${collection}?key=${FB_CONFIG.apiKey}`;
const r = await fetch(url + (docId ? `?key=${FB_CONFIG.apiKey}` : “”));
if(!r.ok) return docId ? null : [];
const j = await r.json();
if(docId) return fbToObj(j);
return (j.documents||[]).map(fbToObj).filter(Boolean);
} catch { return docId ? null : []; }
}

async function fbQuery(collection, field, op, value) {
try {
const body = {
structuredQuery: {
from: [{ collectionId: collection }],
where: {
fieldFilter: {
field: { fieldPath: field },
op: op === “==” ? “EQUAL” : op,
value: { stringValue: String(value) }
}
}
}
};
const r = await fetch(`${FB_URL.replace("/documents","")}:runQuery?key=${FB_CONFIG.apiKey}`, {
method: “POST”,
headers: { “Content-Type”: “application/json” },
body: JSON.stringify(body)
});
if(!r.ok) return [];
const j = await r.json();
return j.filter(x=>x.document).map(x=>fbToObj(x.document)).filter(Boolean);
} catch { return []; }
}

async function fbSet(collection, docId, data) {
try {
const url = `${FB_URL}/${collection}/${docId}?key=${FB_CONFIG.apiKey}`;
const r = await fetch(url, {
method: “PATCH”,
headers: { “Content-Type”: “application/json” },
body: JSON.stringify(objToFb(data))
});
return r.ok;
} catch { return false; }
}

async function fbAdd(collection, data) {
try {
const url = `${FB_URL}/${collection}?key=${FB_CONFIG.apiKey}`;
const r = await fetch(url, {
method: “POST”,
headers: { “Content-Type”: “application/json” },
body: JSON.stringify(objToFb(data))
});
if(!r.ok) return null;
const j = await r.json();
return fbToObj(j);
} catch { return null; }
}

// Compatibility wrappers
async function sbGet(table, filters=””) {
if(filters.includes(“email=eq.”)) {
const val = decodeURIComponent(filters.split(“email=eq.”)[1].split(”&”)[0]);
return fbQuery(table, “email”, “==”, val);
}
if(filters.includes(“celular=eq.”)) {
const val = decodeURIComponent(filters.split(“celular=eq.”)[1].split(”&”)[0]);
return fbQuery(table, “celular”, “==”, val);
}
if(filters.includes(“cnpj=eq.”)) {
const val = decodeURIComponent(filters.split(“cnpj=eq.”)[1].split(”&”)[0]);
return fbQuery(table, “cnpj”, “==”, val);
}
if(filters.includes(“id=eq.”)) {
const id = filters.split(“id=eq.”)[1].split(”&”)[0];
const doc = await fbGet(table, id);
return doc ? [doc] : [];
}
if(filters.includes(“cliente_id=eq.”)) {
const id = filters.split(“cliente_id=eq.”)[1].split(”&”)[0];
return fbQuery(table, “cliente_id”, “==”, id);
}
return fbGet(table);
}
async function sbPost(table, data) {
const result = await fbAdd(table, data);
return result ? [result] : null;
}
async function sbPatch(table, filter, data) {
const id = filter.split(“id=eq.”)[1];
return fbSet(table, id, data);
}

/* Capitaliza corretamente: maiúsculas com acentos e pontuação */
/* Palavras que NÃO devem ser capitalizadas em títulos portugueses */
const PT_PREPOSITIONS = new Set([
“de”,“da”,“do”,“das”,“dos”,“e”,“em”,“na”,“no”,“nas”,“nos”,
“a”,“o”,“as”,“os”,“ao”,“aos”,“à”,“às”,“por”,“pelo”,“pela”,
“pelos”,“pelas”,“com”,“sem”,“sob”,“sobre”,“entre”,“para”,
“num”,“numa”,“nuns”,“numas”,“dum”,“duma”,
]);

function toTitleCase(str) {
if(!str) return str;
// Normalize: trim extra spaces
const s = str.trim().replace(/\s+/g,” “);
return s.toLowerCase().split(” “).map((word, i) => {
if(!word) return word;
// Always capitalize first and last word
if(i === 0) return capitalize(word);
// Don’t capitalize prepositions/articles in middle
if(PT_PREPOSITIONS.has(word)) return word;
return capitalize(word);
}).join(” “);
}

function capitalize(word) {
if(!word) return word;
// Handle accented first chars correctly
return word.charAt(0).toUpperCase() + word.slice(1);
}

/* Normaliza campos ao gravar — aplica Title Case com regras PT */
function normalizaCliente() {
const textFields = [“razao”,“contato”,“logradouro”,“bairro”,“cidade”,“complemento”];
textFields.forEach(f => { if(cl[f]) upd(f, toTitleCase(cl[f])); });
}

/* Normaliza um valor de campo em tempo real enquanto o usuário digita */
function normalizaField(field, value) {
const textFields = [“razao”,“contato”,“logradouro”,“bairro”,“cidade”,“complemento”];
if(!textFields.includes(field)) return value;
// Capitalize only after space, hyphen, slash or start
const words = value.split(/( |-|/)/);
return words.map((part, i) => {
// Separators stay as-is
if(part === “ “ || part === “-” || part === “/”) return part;
if(!part) return part;
const lower = part.toLowerCase();
// First word always caps; others check prepositions
const isFirst = i === 0 || words[i-1] === “-” || words[i-1] === “/”;
if(isFirst) return capitalize(lower);
if(PT_PREPOSITIONS.has(lower)) return lower;
return capitalize(lower);
}).join(””);
}

function validateClient(){

const cnpjRe  = /^\d{2}.\d{3}.\d{3}/\d{4}-\d{2}$/;
if(!cl.razao.trim())         errs.razao       = “Razão Social é obrigatória”;
if(!cl.cnpj.trim())          errs.cnpj        = “CNPJ é obrigatório”;
else if(!cnpjRe.test(cl.cnpj)) errs.cnpj      = “CNPJ inválido (ex: 00.000.000/0001-00)”;
if(!cl.ie.trim())             errs.ie          = “Inscrição Estadual é obrigatória”;
if(!cl.email.trim())          errs.email       = “E-mail é obrigatório”;
else if(!emailRe.test(cl.email)) errs.email    = “E-mail inválido”;
if(!cl.emailXml.trim())       errs.emailXml    = “E-mail para XML é obrigatório”;
else if(!emailRe.test(cl.emailXml)) errs.emailXml = “E-mail para XML inválido”;
if(!cl.telefone.trim()&&!cl.celular.trim()) errs.telefone = “Informe Telefone ou Celular”;
if(!cl.cep.trim())            errs.cep         = “CEP é obrigatório”;
if(!cl.logradouro.trim())     errs.logradouro  = “Logradouro é obrigatório”;
if(!cl.cidade.trim())         errs.cidade      = “Cidade é obrigatória”;
if(!cl.estado.trim())         errs.estado      = “Estado é obrigatório”;
setFormErrors(errs);
return Object.keys(errs).length === 0;
}

        <h2 style={S.pageTitle}>Dados do Cliente</h2>

        <Sec title="Dados Fiscais">
          <Row>
            <Fld label="CNPJ *" flex={1} err={formErrors.cnpj}><FI value={cl.cnpj} err={formErrors.cnpj} onChange={v=>upd("cnpj",maskCnpj(v))} ph="00.000.000/0000-00"/></Fld>
            <Fld label="Inscrição Estadual *" flex={1} err={formErrors.ie}><FI value={cl.ie} err={formErrors.ie} onChange={v=>upd("ie",v)} ph="Ex: 000.000.000.000"/></Fld>
          </Row>
          <Row>
            <Fld label="Razão Social *" flex={2} err={formErrors.razao}><FI value={cl.razao} err={formErrors.razao} onChange={v=>upd("razao",v)} ph="Farmácia Saúde Total Ltda." list="dl-razao"/></Fld>
          </Row>
          <Row center>
            <Fld label="Responsável" flex={1} style={{maxWidth:300}}><FI value={cl.contato} onChange={v=>upd("contato",v)} ph="João Silva"/></Fld>
          </Row>
        </Sec>

        <Sec title="Contatos">
          <Row>
            <Fld label="E-mail *" flex={2} err={formErrors.email}><FI value={cl.email} err={formErrors.email} onChange={v=>upd("email",v)} ph="contato@farmacia.com.br" type="email" list="dl-email"/></Fld>
            <Fld label="E-mail para XML *" flex={2} err={formErrors.emailXml}><FI value={cl.emailXml} err={formErrors.emailXml} onChange={v=>upd("emailXml",v)} ph="nfe@farmacia.com.br" type="email" list="dl-emailXml"/></Fld>
            <Fld label="Telefone *" flex={1} err={formErrors.telefone}><FI value={cl.telefone} err={formErrors.telefone} onChange={v=>upd("telefone",maskPhone(v))} ph="(00) 0000-0000"/></Fld>
            <Fld label="Celular / WhatsApp" flex={1}><FI value={cl.celular} onChange={v=>upd("celular",maskPhone(v))} ph="(00) 00000-0000"/></Fld>
          </Row>
        </Sec>

        <Sec title="Endereço de Entrega">
          <Row>
            <Fld label="Logradouro *" flex={3} err={formErrors.logradouro}><FI value={cl.logradouro} err={formErrors.logradouro} onChange={v=>upd("logradouro",v)} ph="Rua, Av., Travessa…" list="dl-logradouro"/></Fld>
            <Fld label="Número" flex={1}><FI value={cl.numero} onChange={v=>upd("numero",v)} ph="123"/></Fld>
          </Row>
          <Row>
            <Fld label="Complemento"><FI value={cl.complemento} onChange={v=>upd("complemento",v)} ph="Sala, Loja…" list="dl-complemento"/></Fld>
            <Fld label="Bairro"><FI value={cl.bairro} onChange={v=>upd("bairro",v)} ph="Centro" list="dl-bairro"/></Fld>
            <Fld label="CEP *" flex={1} err={formErrors.cep}>
              <FI value={cl.cep} onChange={v=>{const m=maskCep(v);upd("cep",m);if(m.replace(/\D/g,"").length===8)aplicarCep(m);else setCepMsg(null);}} ph="00000-000" list="dl-cep"/>
              {cepMsg&&<div style={{fontSize:11,marginTop:4,padding:"4px 8px",borderRadius:6,textAlign:"center",color:cepMsg.type==="ok"?C.green:C.red,background:cepMsg.type==="ok"?"rgba(74,222,128,0.1)":"rgba(252,165,165,0.1)",border:`1px solid ${cepMsg.type==="ok"?"rgba(74,222,128,0.3)":"rgba(252,165,165,0.3)"}`}}>{cepMsg.text}</div>}
            </Fld>
          </Row>
          <Row>
            <Fld label="Cidade *" err={formErrors.cidade}><FI value={cl.cidade} err={formErrors.cidade} onChange={v=>upd("cidade",v)} ph="São Paulo" list="dl-cidade"/></Fld>
            <Fld label="Estado *" err={formErrors.estado}><FS value={cl.estado} onChange={v=>upd("estado",v)}><option value="">UF</option>{UFS.map(u=><option key={u} value={u}>{u}</option>)}</FS></Fld>
          </Row>
        </Sec>

        <Sec title="Pagamento">
          <Row>
            <Fld label="Forma de Pagamento *" flex={2}><FS value={cl.pagamento} onChange={v=>upd("pagamento",v)}>{PGTOS.map(p=><option key={p} value={p}>{p}</option>)}</FS></Fld>
            <Fld label="Prazo Negociado" flex={1}><FI value={cl.prazo} onChange={v=>upd("prazo",v)} ph="Ex: 30 dias"/></Fld>
          </Row>
          <Row>
            <Fld label="Observações" flex={1}>
              <textarea value={cl.obs} onChange={e=>upd("obs",e.target.value)} placeholder="Instruções de entrega, horário, referências…" rows={3} style={{...S.finput,resize:"vertical",height:"auto",textAlign:"left"}}/>
            </Fld>
          </Row>
        </Sec>

        <button className="hbtn" style={S.primBtn} onClick={()=>setView("cart")}>Salvar e Ver Pedido →</button>
      </div>
    )}

    {/* CARRINHO */}
    {view==="cart"&&!done&&(
      <div style={S.cartView} className="fi">
        <h2 style={S.pageTitle}>Resumo do Pedido</h2>
        {items.length===0
          ?<div style={S.empty}><div style={{fontSize:52}}>🛒</div><p style={{color:C.sub,marginTop:12}}>Seu pedido está vazio.</p><button className="hbtn" style={S.ghostBtn} onClick={()=>setView("catalog")}>← Ver Catálogo</button></div>
          :<>
            <div style={S.ciList}>
              {items.map(it=>(
                <div key={it.id} style={S.ci}>
                  <div style={{fontSize:28,flexShrink:0}}>{it.img}</div>
                  <div style={{flex:1,minWidth:0}}><div style={S.ciName}>{it.name}</div><div style={S.ciMeta}>{it.unit} · {it.brand}</div></div>
                  <div style={S.ciRight}>
                    <div style={S.qC}><button style={S.qB} onClick={()=>setQ(it.id,getQ(it.id)-1)}>−</button><span style={S.qN}>{getQ(it.id)}</span><button style={S.qB} onClick={()=>setQ(it.id,getQ(it.id)+1)}>+</button></div>
                    <div style={S.ciTotal}>R$ {fmt(it.qty*it.price)}</div>
                    <button style={S.rem} onClick={()=>remCart(it.id)}>✕ remover</button>
                  </div>
                </div>
              ))}
            </div>
            {required
              ?<div style={S.clCard}>

                <div style={S.clGrid}>
                  {[["Razão Social",cl.razao],["CNPJ",cl.cnpj],["E-mail",cl.email],["Telefone",cl.telefone||cl.celular],

                    <div key={k} style={S.clRow}><span style={S.clKey}>{k}</span><span style={S.clVal}>{v}</span></div>
                  ))}

              </div>

            }
            <div style={S.summ}>
              {[["Itens",`${count} unidades`],["Frete",total>=300?"Grátis 🎉":"A calcular"],["Entrega","3–5 dias úteis"]].map(([k,v])=>(
                <div key={k} style={S.sRow}><span style={{color:C.sub}}>{k}</span><span style={{color:k==="Frete"&&total>=300?C.green:k==="Entrega"?"#FFD000":C.text}}>{v}</span></div>
              ))}
              <div style={S.sDivider}/>
              <div style={{...S.sRow,fontSize:18,fontWeight:800}}><span>Total do Pedido</span><span style={{color:"#FFD000"}}>R$ {fmt(total)}</span></div>
              {total<300&&<div style={S.tip}>💡 Faltam R$ {fmt(300-total)} para frete grátis!</div>}
              <button className="hbtn" style={{...S.primBtn,marginTop:20,opacity:required?1:.4}} onClick={handleOrder}>Confirmar Pedido →</button>
            </div>
          </>
        }
      </div>
    )}

    {/* CONFIRMAÇÃO */}
    {view==="confirm"&&(
      <div style={S.confWrap} className="fi">
        <div style={S.confBox}>
          <Logo size={72}/><div style={S.confCo}>CNPJ 24.453.519/0001-93</div>
          <div style={{fontSize:46,margin:"14px 0 4px"}}>✅</div>
          <h2 style={S.confTitle}>Pedido Confirmado!</h2>
          <p style={S.confTxt}>Seu pedido foi registrado. Nossa equipe entrará em contato para confirmar entrega e pagamento.</p>

          {/* ── ESPELHO DO PEDIDO ── */}
          <div style={{...S.confDets,marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:"#FFD000",textAlign:"center",marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>📋 Dados do Cliente</div>
            {[["Protocolo",`#${ref}`],["Razão Social",cl.razao||"–"],["CNPJ",cl.cnpj||"–"],
              ["E-mail",cl.email||"–"],["E-mail XML",cl.emailXml||"–"],["Telefone",cl.telefone||cl.celular||"–"],
              ["Endereço",cl.logradouro?`${cl.logradouro}${cl.numero?", "+cl.numero:""}${cl.bairro?" – "+cl.bairro:""} – ${cl.cidade}/${cl.estado}`:"–"],
              ["CEP",cl.cep||"–"],["Forma de Pgto.",cl.pagamento],["Prazo",cl.prazo||"A combinar"],
            ].map(([k,v])=>(
              <div key={k} style={S.confRow}><span style={{color:C.sub,fontSize:11,textTransform:"uppercase"}}>{k}</span><span style={{color:"#fff",fontWeight:500,fontSize:12,textAlign:"right",maxWidth:"60%",textTransform:"uppercase"}}>{v}</span></div>
            ))}
            {cl.obs&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.1)",fontSize:11,color:C.sub}}><strong style={{color:"#FFD000"}}>Obs.:</strong> {cl.obs}</div>}
          </div>

          <div style={{...S.confDets,marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:"#FFD000",textAlign:"center",marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>🛒 Itens do Pedido</div>
            {confirmedItems.map((it,i)=>(
              <div key={i} style={{...S.confRow,alignItems:"center"}}>
                <span style={{color:"#fff",fontSize:12,flex:1,textTransform:"uppercase"}}>{it.img} {it.name}</span>
                <span style={{color:C.sub,fontSize:11,marginLeft:8}}>{it.qty}x</span>
                <span style={{color:"#FFD000",fontWeight:700,fontSize:12,marginLeft:8}}>R$ {fmt(it.qty*it.price)}</span>
              </div>
            ))}
            <div style={{borderTop:"1px solid rgba(255,255,255,0.15)",marginTop:8,paddingTop:8,display:"flex",justifyContent:"space-between"}}>
              <span style={{color:"#fff",fontWeight:700,fontSize:13}}>Total</span>
              <span style={{color:"#FFD000",fontWeight:800,fontSize:15}}>R$ {fmt(confirmedTotal)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
              <span style={{color:C.sub,fontSize:11}}>Entrega</span>
              <span style={{color:"#4ade80",fontSize:11}}>3–5 dias úteis</span>
            </div>
          </div>

          {/* ── BOTÕES ── */}
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <button className="hbtn" style={{...S.primBtn,background:"#e53e3e",color:"#fff"}} onClick={gerarPDF}>
              📄 Gerar PDF do Pedido
            </button>
            <button className="hbtn" style={{...S.primBtn,background:"#FFD000",color:"#1340b0"}}
              onClick={()=>{setEmailDestino(cl.email||"");setShowEmailDialog(true);}}>
              📧 Enviar por E-mail
            </button>
            <button className="hbtn" style={S.primBtn}
              onClick={()=>{setDone(false);setConfirmedItems([]);setConfirmedTotal(0);setView("catalog");}}>
              Fazer Novo Pedido
            </button>
          </div>

          {/* Email Dialog */}
          {showEmailDialog&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:20}}>
              <div style={{background:"#1340b0",borderRadius:16,padding:"28px 24px",width:"100%",maxWidth:360,boxShadow:"0 12px 40px rgba(0,0,0,0.4)"}}>
                <h3 style={{color:"#FFD000",fontSize:16,fontWeight:800,textAlign:"center",marginBottom:6,textTransform:"uppercase"}}>Enviar por E-mail</h3>
                <p style={{color:"rgba(255,255,255,0.6)",fontSize:12,textAlign:"center",marginBottom:18}}>Digite o e-mail para envio do espelho do pedido</p>
                <label style={{...S.authLabel,marginBottom:6}}>E-mail</label>
                <input type="email" value={emailDestino}
                  onChange={e=>setEmailDestino(e.target.value)}
                  placeholder="destinatario@email.com"
                  style={{...S.authInput,marginBottom:16,width:"100%"}}
                  onKeyDown={e=>{if(e.key==="Enter"){enviarEmailPara(emailDestino);setShowEmailDialog(false);}}}
                />
                <div style={{display:"flex",gap:10}}>
                  <button className="hbtn"
                    style={{flex:1,padding:"11px",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:10,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"'Inter',sans-serif"}}
                    onClick={()=>setShowEmailDialog(false)}>
                    Cancelar
                  </button>
                  <button className="hbtn"
                    style={{flex:1,padding:"11px",background:"#FFD000",border:"none",borderRadius:10,color:"#1340b0",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"'Inter',sans-serif"}}
                    onClick={()=>{enviarEmailPara(emailDestino);setShowEmailDialog(false);}}>
                    Enviar →
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    )}
  </main>

    {/* MEUS PEDIDOS */}
    {view==="history"&&(
      <div style={S.cartView} className="fi">
        <h2 style={S.pageTitle}>Meus Pedidos</h2>
        {orderHistory.length===0

              <div style={{fontSize:52}}>📦</div>
              <p style={{color:C.sub,marginTop:12}}>Nenhum pedido realizado ainda.</p>

          :<div style={{display:"flex",flexDirection:"column",gap:14}}>
            {orderHistory.map((o,i)=>(
              <div key={i} style={{background:"#1340b0",border:"1px solid rgba(255,255,255,0.2)",borderRadius:14,padding:18}}>

                    <div style={{fontSize:13,fontWeight:800,color:"#FFD000"}}>Pedido #{o.ref}</div>

                <div style={{borderTop:"1px solid rgba(255,255,255,0.1)",paddingTop:10,marginBottom:8}}>
                  <div style={{fontSize:11,color:C.sub,marginBottom:6}}>CLIENTE: <span style={{color:"#fff",fontWeight:600}}>{o.cliente}</span></div>
                  <div style={{fontSize:11,color:C.sub,marginBottom:6}}>CNPJ: <span style={{color:"#fff"}}>{o.cnpj}</span></div>

                </div>
                <button className="hbtn"
                  style={{width:"100%",padding:"9px",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Inter',sans-serif"}}
                  onClick={()=>{
                    const linhaItens = o.itens.map(it=>it.name+" - Qtd: "+it.qty+" - R$ "+(it.qty*it.price).toFixed(2).replace(".",",")).join("\n");
                    const texto = "PEDIDO #"+o.ref+"\nData: "+o.data+" as "+o.hora+"\n\nCLIENTE: "+o.cliente+"\nCNPJ: "+o.cnpj+"\nPAGAMENTO: "+o.pagamento+"\n\nITENS\n"+linhaItens+"\n\nTOTAL: R$ "+o.total.toFixed(2).replace(".",",")+"\n\nStart Zero - CNPJ 24.453.519/0001-93";
                    window.open("mailto:?subject="+encodeURIComponent("Pedido #"+o.ref+" - "+o.cliente)+"&body="+encodeURIComponent(texto));
                  }}>
                  📧 Reenviar por E-mail
                </button>
              </div>
            ))}
          </div>
        }
      </div>
    )}

        {view==="catalog"&&items.length>0&&(
    <div style={S.sticky}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <Logo size={36}/>
        <div><div style={{fontSize:11,color:C.sub}}>{items.length} produto(s)</div><div style={{fontSize:17,fontWeight:800,color:"#FFD000"}}>R$ {fmt(total)}</div></div>
      </div>
      <button className="hbtn" style={S.primBtn} onClick={()=>setView("cart")}>Ver Pedido →</button>
    </div>
  )}

  <footer style={S.footer}><Logo size={26}/><span style={S.footTxt}>START ZERO · CNPJ 24.453.519/0001-93</span></footer>
</div>

function Sec({title,children}){return(<div style={{marginBottom:28}}><div style={{textAlign:“center”,marginBottom:14}}><span style={{fontSize:13,fontWeight:700,color:”#FFD000”,textTransform:“uppercase”,letterSpacing:2}}>{title}</span></div>{children}</div>);}
function Row({children,center}){return <div style={{display:“flex”,gap:12,flexWrap:“wrap”,marginBottom:12,justifyContent:center?“center”:“flex-start”}}>{children}</div>;}
function Fld({label,children,flex=1,err}){return(<div style={{flex,minWidth:140}}><label style={{fontSize:11,fontWeight:700,color:err?”#fca5a5”:”#FFD000”,display:“block”,marginBottom:5,textTransform:“uppercase”,letterSpacing:.4,textAlign:“center”}}>{label}</label>{children}{err&&<div style={{fontSize:10,color:”#fca5a5”,marginTop:3,textAlign:“center”}}>⚠ {err}</div>}</div>);}
function FI({value,onChange,ph,type=“text”,err,list}){return <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} list={list} autoComplete={list?“off”:undefined} style={{…S.finput,…(err?{borderColor:”#fca5a5”,boxShadow:“0 0 0 2px rgba(252,165,165,0.2)”}:{})}}/>;}
function FS({value,onChange,children}){return <select value={value} onChange={e=>onChange(e.target.value)} style={S.finput}>{children}</select>;}
